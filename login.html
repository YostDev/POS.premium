<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Panel Admin</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; }
        body { background: #f4f6f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .login-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); width: 100%; max-width: 400px; text-align: center; }
        .login-card h2 { margin-bottom: 8px; color: #333; }
        .login-card p { font-size: 14px; color: #666; margin-bottom: 25px; }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; transition: 0.3s; }
        .input-group input:focus { border-color: #2563eb; }
        button { width: 100%; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #1d4ed8; }
        #error-msg { color: #dc2626; font-size: 13px; margin-top: 15px; display: none; background: #fee2e2; padding: 8px; border-radius: 6px; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Panel de Control</h2>
        <p>Ingresa tus datos para gestionar el negocio</p>
        
        <form id="form-login">
            <div class="input-group">
                <label for="usuario">Usuario</label>
                <input type="text" id="usuario" placeholder="Ej: aromasbonitos" required autocomplete="username">
            </div>
            
            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
            </div>
            
            <button type="submit" id="btn-entrar">Ingresar</button>
            <div id="error-msg">Usuario o contraseña incorrectos</div>
        </form>
    </div>

    <script>
        const SUPABASE_URL = 'https://bxwxulztcencoiiqogxy.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_DcBleL9fOIrDT9cRn4QOfA_b5ALE3JD'; 

        const urlParams = new URLSearchParams(window.location.search);
        const negocioParam = urlParams.get('negocio') ? `?negocio=${urlParams.get('negocio')}` : '';

        $('#form-login').on('submit', function(e) {
            e.preventDefault();
            $('#error-msg').hide();
            $('#btn-entrar').text('Verificando...').prop('disabled', true);

            const usuarioInput = $('#usuario').val().trim();
            const password = $('#password').val();

            const emailFalso = usuarioInput.includes('@') ? usuarioInput : `${usuarioInput}@pos.com`;

            $.ajax({
                url: `${SUPABASE_URL}/auth/v1/token?grant_type=password`,
                type: 'POST',
                headers: {
                    'apikey': SUPABASE_ANON_KEY,
                    'Content-Type': 'application/json'
                },
                data: JSON.stringify({ email: emailFalso, password: password }),
                success: function(response) {
                    localStorage.setItem('supabase_token', response.access_token);
                    localStorage.setItem('supabase_refresh_token', response.refresh_token);
                    window.location.href = `panel.html${negocioParam}`;
                },           
                error: function() {
                    $('#error-msg').show();
                    $('#btn-entrar').text('Ingresar').prop('disabled', false);
                }
            });
        });
    </script>
</body>
</html>
